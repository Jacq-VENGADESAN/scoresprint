name: Inspect Sonar PR

on:
  pull_request:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for automatic analysis
        run: sleep 90
      - name: Print open Sonar issues
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          curl --fail --silent --show-error --get \
            --data-urlencode "componentKeys=Jacq-VENGADESAN_scoresprint" \
            --data-urlencode "pullRequest=${PR_NUMBER}" \
            --data-urlencode "resolved=false" \
            --data-urlencode "ps=500" \
            https://sonarcloud.io/api/issues/search > sonar-issues.json
          python - <<'PY'
          import json
          with open('sonar-issues.json', encoding='utf-8') as handle:
              payload = json.load(handle)
          issues = payload.get('issues', [])
          print(f'OPEN_ISSUES={len(issues)}')
          for issue in issues:
              print('---')
              print('RULE=', issue.get('rule'))
              print('MESSAGE=', issue.get('message'))
              print('COMPONENT=', issue.get('component'))
              print('LINE=', issue.get('line'))
              print('SEVERITY=', issue.get('severity'))
              print('TYPE=', issue.get('type'))
              print('IMPACTS=', issue.get('impacts'))
          PY
