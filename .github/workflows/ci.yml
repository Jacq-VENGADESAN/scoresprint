name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run validate:questions
      - run: npm run validate:listening
      - run: npm run validate:launch
      - run: npm run validate:beta
      - run: npm run typecheck
      - run: npm run build
